name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # No committed lockfile, so install (not ci). The build and tests are
      # hermetic: no secrets, no network. The mcp/ smoke test is intentionally
      # excluded because it does live network I/O and mcp/ may be untracked.
      - run: npm install
      - run: npm test
      - run: npm run build
