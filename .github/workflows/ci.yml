name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # The root lockfile is committed, so install reproducibly. The build and
      # tests are hermetic: no secrets, no network. `npm test` is a bare `node --test`; the
      # non-hermetic mcp smoke is named mcp/smoke.mjs (not test-*.mjs) so the test
      # runner's auto-discovery skips it. Run it manually with `node mcp/smoke.mjs`.
      - run: npm ci
      - run: npm run check:generated
      - run: npm test
      - run: npm run build
