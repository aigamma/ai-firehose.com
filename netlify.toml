# Netlify serves the static React site plus one light read function
# (/api/retrieve, the non-chat semantic search proxy). The heavy
# ingestion and precompute run on the Fly.io worker, not here.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# API routes go to functions. This must come before the SPA fallback.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Single-page-app fallback for client-side routing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Content-hashed build assets are immutable.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Precomputed data artifacts are rebuilt by the worker. Atomic Netlify deploys
# purge the CDN on every publish, so a longer browser cache never strands a stale
# artifact past a deploy; the stale-while-revalidate tail keeps repeat visits fast.
# The home above-the-fold data is additionally inlined into the HTML at build time
# (see vite.config.js), so the landing view never waits on these fetches at all.
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=1800, s-maxage=1800, stale-while-revalidate=604800"

# Security headers for all routes. CSP allows the inline theme-bootstrap script
# and JSX inline styles ('unsafe-inline'); everything else is same-origin, except
# the Watch surface: img-src grants YouTube thumbnails (i.ytimg.com) and frame-src
# grants the click-to-play embed (youtube-nocookie.com only). Without these two the
# Watch feature works in `npm run dev` but silently fails in production. The runtime
# makes no XHR to YouTube (RSS and the corpus join happen at build), so connect-src
# stays same-origin.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://i.ytimg.com https://upload.wikimedia.org; font-src 'self'; connect-src 'self'; frame-src https://www.youtube-nocookie.com; base-uri 'self'; frame-ancestors 'none'; object-src 'none'"
