    <script>
      // Dark-first: set the theme before first paint to avoid a flash. Default
      // to dark unless the visitor has explicitly chosen light. The OS
      // prefers-color-scheme is intentionally ignored, so the site is dark by
      // default for everyone, with the toggle as the only opt-out.
      (function () {
        try {
          var t = localStorage.getItem('aifh-theme') === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
